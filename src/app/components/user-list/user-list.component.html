<div class="filters">
        <h2>Filtro de usuarios</h2>
        <input
            type="text"
            placeholder="Filtrar por nombre..."
            [value]="nameFilter()" 
            (input)="nameFilter.set($any($event.target).value)">

        <select
            [value]="cityFilter()"
            (change)="cityFilter.set($any($event.target).value)">
            <option value="">Todas las ciudades</option>
            @for (city of uniqueCities(); track city) {
            <option [value]="city">
                {{ city }}
            </option>
            }
        </select>

        <button (click)="resetFilters()">Resetear filtros</button>

    </div>

<div class="tabla">
    <h2>Lista de Usuarios</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
            </tr>
        </thead>

        <tbody>
            @for (user of filteredUsers(); track user.id) {
            <tr style="cursor:pointer" (click)="goToDetails(user.id)">
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.phone }}</td>
            </tr>
            }
        </tbody>
    </table>
</div>
