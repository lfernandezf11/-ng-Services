<div class="header-container">
    <nav>
        <button routerLink="/">{{ 'navbar.home' | translate }}</button>
        <button routerLink="/about">{{ 'navbar.about' | translate }}</button>
        <button routerLink="/animations">{{ 'navbar.animations' | translate }}</button>
        <button routerLink="/sse">{{ 'navbar.sse' | translate }}</button>
        <button routerLink="/websockets">{{ 'navbar.websockets' | translate }}</button>
        @if (isAuthenticated()) {
            <button (click)="logout()">{{ 'navbar.logout' | translate }}</button>
        } @else {
            <button routerLink="/login">{{ 'navbar.login' | translate }}</button>
        }

    </nav>
    <button class="toggle-lang" (click)="toggleLanguage()"
        [value]="currentLanguage.toUpperCase()">
        {{ currentLanguage === 'en' ? 'ES' : 'EN' }}
    </button>
</div>
